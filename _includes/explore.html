<div class="explore-widget">
  <div class="explore-search">
    <input type="text" id="explore-input" placeholder="What are you looking for?" autocomplete="off" />
  </div>
  <div class="explore-chips">
    <button class="explore-chip" data-keyword="blockchain">blockchain</button>
    <button class="explore-chip" data-keyword="DEMETER">DEMETER</button>
    <button class="explore-chip" data-keyword="computer vision">computer vision</button>
    <button class="explore-chip" data-keyword="DV">DV</button>
    <button class="explore-chip" data-keyword="TI">TI</button>
    <button class="explore-chip" data-keyword="SI">SI</button>
    <button class="explore-chip" data-keyword="Node.js">Node.js</button>
    <button class="explore-chip" data-keyword="YOLO">YOLO</button>
    <button class="explore-chip" data-keyword="LLM">LLM</button>
    <button class="explore-chip" data-keyword="Go">Go</button>
    <button class="explore-chip" data-keyword="python">python</button>
    <button class="explore-chip" data-keyword="patent">patent</button>
    <button class="explore-chip" data-keyword="publication">publication</button>
    <button class="explore-chip" data-keyword="experience">experience</button>
  </div>
  <div id="explore-results"></div>
</div>

<style>
.explore-widget {
  margin-top: 2rem;
  margin-bottom: 1rem;
}
.explore-search input {
  width: 100%;
  padding: 0.6rem 0.9rem;
  font-size: 0.95rem;
  border: 1px solid var(--global-divider-color, #dee2e6);
  border-radius: 6px;
  background: var(--global-bg-color, #fff);
  color: var(--global-text-color, #111);
  outline: none;
  transition: border-color 0.2s;
}
.explore-search input:focus {
  border-color: var(--global-theme-color, #0076df);
}
.explore-chips {
  margin-top: 0.6rem;
  display: flex;
  flex-wrap: wrap;
  gap: 0.35rem;
}
.explore-chip {
  padding: 0.2rem 0.6rem;
  font-size: 0.78rem;
  border: 1px solid var(--global-divider-color, #dee2e6);
  border-radius: 999px;
  background: transparent;
  color: var(--global-text-color, #333);
  cursor: pointer;
  transition: background 0.15s, color 0.15s;
}
.explore-chip:hover {
  background: var(--global-theme-color, #0076df);
  color: #fff;
  border-color: var(--global-theme-color, #0076df);
}
#explore-results {
  margin-top: 0.8rem;
}
.explore-result {
  display: block;
  padding: 0.7rem 0.8rem;
  margin-bottom: 0.4rem;
  border: 1px solid var(--global-divider-color, #dee2e6);
  border-radius: 6px;
  text-decoration: none;
  color: var(--global-text-color, #111);
  transition: border-color 0.15s;
}
.explore-result:hover {
  border-color: var(--global-theme-color, #0076df);
  text-decoration: none;
  color: var(--global-text-color, #111);
}
.explore-result-type {
  display: inline-block;
  font-size: 0.7rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: var(--global-theme-color, #0076df);
  margin-bottom: 0.15rem;
}
.explore-result-title {
  display: block;
  font-weight: 600;
  font-size: 0.9rem;
  line-height: 1.3;
}
.explore-result-desc {
  display: block;
  font-size: 0.8rem;
  color: var(--global-text-color-light, #666);
  margin-top: 0.1rem;
  line-height: 1.4;
}
.explore-empty {
  font-size: 0.85rem;
  color: var(--global-text-color-light, #999);
  padding: 0.5rem 0;
}
</style>

<script src="{{ '/assets/js/explore.js' | relative_url }}"></script>
